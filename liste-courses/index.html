<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listes des courses</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-green-50">
    <div class="bg-white flex flex-col w-80 mx-auto my-32 rounded-2xl shadow-lg p-8">

        <h1 class="font-bold text-2xl text-gray-800">🛒 Liste de courses</h1>
        <div class="flex flex-row justify-between gap-2 my-8">
            <input id="input" type="text"
                class="w-full text-sm rounded-xl border border-lg focus:outline-none focus:border-green-500  p-2"
                placeholder="Ajouter un article...">
            <button id="btna" class="bg-green-500 text-white text-sm rounded-xl p-2 ">Ajouter</button>
        </div>
        <ul id="liste" class="flex flex-col-reverse text-sm rounded-xl gap-2 "></ul>
    </div>
    <script>
        let input = document.querySelector("#input");
        let btna = document.querySelector("#btna");
        let ul = document.querySelector("#liste");

        btna.addEventListener("click", () => {
            if (input.value === "") return
            let li = document.createElement("li");
            li.className = "text-sm rounded-xl border w-full px-4 flex justify-between itmes-center  py-3";
            li.textContent = input.value;

            let btns = document.createElement("button");
            btns.className = "text-sm text-gray-400 "
            btns.textContent = "✕";
            btns.addEventListener("click", () => {
                li.remove();
            });

            li.appendChild(btns);
            ul.appendChild(li);
            input.value = "";


        });

        // input.addEventListener("keydown", (e) => {
        //     if (e.Key === "Enter") btna.click();
        // });

         input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") btna.click();
        });


    </script>
</body>

</html>
